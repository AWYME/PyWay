<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}*Вставить название*{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <nav>
        <div class="nav-container">
            <a href="{{ url_for('index') }}" class="logo">*Вставить название*</a>
            <div class="nav-links">
                <a href="{{ url_for('courses') }}">Курсы</a>
                {% if session.get['id'] %}
                    <a href="{{ url_for('profile') }}">Профиль</a>
                {% else %}
                    <a href="{{ url_for('login') }}">Войти</a>
                    <a href="{{ url_for('signUp') }}">Регистрация</a>
                {% endif %}
            </div>
        </div>
    </nav>
    <main>
        {% block content %}{% endblock %}
    </main>
</body>
</html>
